<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💕</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe0ec, #cdeeff, #ffe9f5);
    font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
    height: 100%;
    position: relative;
    padding: 20px;
  }
  .screen.active { display: flex; }

  /* Gift box screen */
  #giftScreen h1 {
    color: #d6478a;
    margin-bottom: 30px;
    font-size: 1.6rem;
  }
  .gift-box {
    cursor: pointer;
    width: 160px;
    height: 140px;
    position: relative;
    animation: bounce 1.8s infinite;
  }
  .box-body {
    width: 160px;
    height: 100px;
    background: linear-gradient(#ff9fc7, #ff7ab0);
    border-radius: 10px;
    position: absolute;
    bottom: 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }
  .box-lid {
    width: 175px;
    height: 35px;
    background: linear-gradient(#ffb6d5, #ff8fbd);
    border-radius: 8px;
    position: absolute;
    top: 55px;
    left: -7px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .ribbon-v {
    width: 20px;
    height: 135px;
    background: #fff2b0;
    position: absolute;
    left: 70px;
    top: 0;
    border-radius: 4px;
  }
  .ribbon-h {
    width: 160px;
    height: 20px;
    background: #fff2b0;
    position: absolute;
    top: 62px;
    border-radius: 4px;
  }
  .bow {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.2rem;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .hint {
    margin-top: 25px;
    color: #a45c88;
    font-size: 0.95rem;
  }

  /* Quiz screen */
  .card {
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    padding: 35px 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    max-width: 380px;
    width: 90%;
  }
  .card h2 {
    color: #d6478a;
    font-size: 1.3rem;
    margin-bottom: 20px;
  }
  .card input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 2px solid #ffb6d5;
    font-size: 1rem;
    text-align: center;
    outline: none;
    margin-bottom: 25px;
  }
  .card input:focus { border-color: #ff5fa2; }
  .heart-btn {
    background: none;
    border: none;
    font-size: 3rem;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .heart-btn:hover { transform: scale(1.15); }

  /* Wrong popup */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .overlay.active { display: flex; }
  .popup {
    background: #fff;
    border-radius: 18px;
    padding: 30px 25px;
    text-align: center;
    max-width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }
  .popup .emoji { font-size: 3rem; }
  .popup h3 { color: #d6478a; margin: 10px 0 20px; font-size: 1.4rem; }
  .popup button {
    background: linear-gradient(#ff9fc7, #ff5fa2);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 25px;
    font-size: 0.95rem;
    cursor: pointer;
  }

  /* Correct - emoji burst */
  #correctEmoji {
    font-size: 5rem;
    display: none;
  }

  /* Deserve screen with slider */
  #deserveScreen h2 {
    color: #d6478a;
    font-size: 1.6rem;
    margin-bottom: 30px;
  }
  .slider-track {
    width: 260px;
    height: 60px;
    background: #ffe0ec;
    border-radius: 30px;
    position: relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
  }
  .slider-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, #ffb6d5, #ff5fa2);
    border-radius: 30px;
    transition: width 0.05s;
  }
  .slider-knob {
    position: absolute;
    left: 2px;
    top: 2px;
    width: 56px;
    height: 56px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    cursor: grab;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    user-select: none;
    touch-action: none;
    z-index: 2;
  }
  .slider-label {
    position: relative;
    z-index: 1;
    width: 100%;
    text-align: center;
    color: #a45c88;
    font-size: 0.85rem;
    pointer-events: none;
  }

  /* Final photo screen */
  #photoScreen img {
    max-width: 85vw;
    max-height: 70vh;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    animation: popin 0.6s ease;
  }
  @keyframes popin {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  #photoScreen p {
    margin-top: 18px;
    color: #d6478a;
    font-size: 1.2rem;
    font-weight: bold;
  }
</style>
</head>
<body>

<canvas id="confettiCanvas" style="position:fixed; inset:0; pointer-events:none; z-index:100;"></canvas>

<!-- Gift Box -->
<div class="screen active" id="giftScreen">
  <h1>Someone left you a little surprise 🎁</h1>
  <div class="gift-box" onclick="openGift()">
    <div class="box-body"></div>
    <div class="box-lid"></div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
    <div class="bow">🎀</div>
  </div>
  <p class="hint">tap the box</p>
</div>

<!-- Quiz -->
<div class="screen" id="quizScreen">
  <div class="card">
    <h2>What is the petname if we combine our names?</h2>
    <input type="text" id="answerInput" placeholder="type your answer...">
    <div>
      <button class="heart-btn" onclick="checkAnswer()">❤️</button>
    </div>
  </div>
</div>

<!-- Correct emoji burst -->
<div class="screen" id="emojiScreen">
  <div id="correctEmoji">🥰</div>
</div>

<!-- Deserve slider -->
<div class="screen" id="deserveScreen">
  <h2>You deserve this 💓</h2>
  <div class="slider-track" id="sliderTrack">
    <div class="slider-fill" id="sliderFill"></div>
    <div class="slider-label" id="sliderLabel">slide to open →</div>
    <div class="slider-knob" id="sliderKnob">💓</div>
  </div>
</div>

<!-- Final photo -->
<div class="screen" id="photoScreen">
  <img src="https://user-gen-media-assets.s3.amazonaws.com/gemini_images/efc2cad6-287b-4a01-87d2-dc836434a25f.png" alt="Ririt">
  <p>💕 Ririt 💕</p>
</div>

<!-- Wrong overlay -->
<div class="overlay" id="wrongOverlay">
  <div class="popup">
    <div class="emoji">🤔</div>
    <h3>Nahin !</h3>
    <button onclick="tryAgain()">try again</button>
  </div>
</div>

<script>
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openGift() {
  showScreen('quizScreen');
}

function checkAnswer() {
  const val = document.getElementById('answerInput').value.trim().toLowerCase();
  if (val === 'ririt') {
    showScreen('emojiScreen');
    document.getElementById('correctEmoji').style.display = 'block';
    setTimeout(() => {
      showScreen('deserveScreen');
    }, 2000);
  } else {
    document.getElementById('wrongOverlay').classList.add('active');
  }
}

function tryAgain() {
  document.getElementById('wrongOverlay').classList.remove('active');
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').focus();
}

// Slider drag logic
const knob = document.getElementById('sliderKnob');
const track = document.getElementById('sliderTrack');
const fill = document.getElementById('sliderFill');
const label = document.getElementById('sliderLabel');
let dragging = false;
let startX = 0;
let knobStart = 0;
const trackWidth = 260;
const knobWidth = 56;
const maxDrag = trackWidth - knobWidth - 4;

function getX(e) {
  return e.touches ? e.touches[0].clientX : e.clientX;
}

function dragStart(e) {
  dragging = true;
  startX = getX(e);
  knobStart = knob.offsetLeft;
}

function dragMove(e) {
  if (!dragging) return;
  const dx = getX(e) - startX;
  let newLeft = Math.min(Math.max(2, knobStart + dx), maxDrag + 2);
  knob.style.left = newLeft + 'px';
  const pct = (newLeft - 2) / maxDrag * 100;
  fill.style.width = (newLeft + knobWidth/2) + 'px';
  label.style.opacity = 1 - pct/100;
  if (pct > 92) {
    dragging = false;
    knob.style.left = (maxDrag + 2) + 'px';
    fill.style.width = '100%';
    setTimeout(() => {
      showScreen('photoScreen');
      fireConfetti();
    }, 250);
  }
}

function dragEnd() {
  dragging = false;
}

knob.addEventListener('mousedown', dragStart);
knob.addEventListener('touchstart', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchend', dragEnd);

function fireConfetti() {
  const duration = 2500;
  const end = Date.now() + duration;
  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 60,
      origin: { x: 0 },
      colors: ['#ff9fc7', '#ffe0ec', '#cdeeff', '#fff2b0']
    });
    confetti({
      particleCount: 5,
      angle: 120,
      spread: 60,
      origin: { x: 1 },
      colors: ['#ff9fc7', '#ffe0ec', '#cdeeff', '#fff2b0']
    });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
  confetti({
    particleCount: 150,
    spread: 100,
    origin: { y: 0.5 }
  });
}
</script>
</body>
</html>
